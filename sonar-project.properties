# Required metadata
sonar.projectKey=slimanibenbadis_GameRecs
sonar.organization=gamerecs

# Project information
sonar.projectName=GameRecs
sonar.projectVersion=1.0

# Monorepo configuration
sonar.modules=frontend,backend

# Frontend module
frontend.sonar.projectBaseDir=gamerecs-front
frontend.sonar.sources=src
frontend.sonar.tests=src/app
frontend.sonar.typescript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.test.inclusions=src/**/*.spec.ts
frontend.sonar.coverage.exclusions=src/**/*.spec.ts,src/test.ts,src/polyfills.ts

# Backend module
backend.sonar.projectBaseDir=gamerecs-back
backend.sonar.sources=src/main/java
backend.sonar.tests=src/test/java
backend.sonar.java.binaries=target/classes
backend.sonar.java.test.binaries=target/test-classes
backend.sonar.java.libraries=target/dependency/*.jar
backend.sonar.coverage.exclusions=src/test/**/*

# Global settings
sonar.sourceEncoding=UTF-8
sonar.host.url=https://sonarcloud.io

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/target/**,**/*.spec.ts 

# Quality Gate Configuration
sonar.qualitygate.wait=true

# Code Coverage Requirements
sonar.coverage.exclusions=**/test/**/*,**/tests/**/*,**/*.spec.ts
frontend.sonar.coverage.minimum=80
backend.sonar.coverage.minimum=80

# Code Duplication
sonar.cpd.exclusions=**/test/**/*,**/tests/**/*,**/*.spec.ts
sonar.duplications.minimumTokens=100

# Code Complexity
sonar.javascript.maxComplexityPerFunction=10
sonar.java.maxComplexityPerMethod=10

# Issue thresholds
sonar.issue.ignore.multicriteria=1
sonar.issue.ignore.multicriteria.1.ruleKey=*
sonar.issue.ignore.multicriteria.1.resourceKey=**/*Test.java,**/*Test.ts,**/*.spec.ts

# Maintainability Rating
sonar.technicalDebt.ratingGrid=0.05,0.1,0.2,0.5 
