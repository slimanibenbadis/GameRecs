name: GameRecs CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - develop
      - 'feature-**'
  pull_request:
    branches: 
      - main
      - develop
      - 'feature-**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - staging
        - production

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gamerecs-back

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --global core.autocrlf input
        git config --global core.eol lf

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run Tests
      run: mvn test

    - name: Run PMD Code Analysis
      run: mvn pmd:check

    - name: Build Docker Image
      run: |
        docker build -t gamerecs-back:${{ github.sha }} .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gamerecs-front

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --global core.autocrlf input
        git config --global core.eol lf

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: './gamerecs-front/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Verify TypeScript Configuration
      run: |
        echo "Current directory: $(pwd)"
        echo "TypeScript configs:"
        ls -la tsconfig*.json
        echo "Content of tsconfig.json:"
        cat tsconfig.json

    - name: Lint
      run: |
        echo "ESLint version: $(./node_modules/.bin/eslint --version)"
        echo "TypeScript version: $(./node_modules/.bin/tsc --version)"
        npm run lint -- --max-warnings 0

    - name: Build
      run: npm run build --configuration=production

    - name: Run Tests with Coverage
      run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless --code-coverage

    - name: Build Docker Image
      run: |
        docker build -t gamerecs-front:${{ github.sha }} .

  quality:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache SonarCloud packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Build and analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
        -Dsonar.projectKey=GameRecs \
        -Dsonar.organization=gamerecs \
        -Dsonar.host.url=https://sonarcloud.io